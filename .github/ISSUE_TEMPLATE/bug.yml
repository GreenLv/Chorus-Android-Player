name: Bug report
description: Report a reproducible public player issue without private artifacts.
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not upload native libraries, APKs, full logs, packet captures, real server URLs, tokens, certificates, internal paths, or experiment data.
  - type: input
    id: version
    attributes:
      label: Commit or version
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Minimal reproduction
      description: Use a public or synthetic URL and redact infrastructure details.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed private binaries, endpoints, credentials, paths, identifiers, logs, and captures.
          required: true
